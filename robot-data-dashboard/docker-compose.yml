services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: robot_stats
      POSTGRES_USER: robot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-robot_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robot -d robot_stats"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://robot:${DB_PASSWORD:-robot_secret}@db:5432/robot_stats
      DATA_ROOT: /data
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ${DATA_ROOT:-/data}:/data:ro
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api

  sync:
    build: ./api
    environment:
      DATABASE_URL: postgresql://robot:${DB_PASSWORD:-robot_secret}@db:5432/robot_stats
      DATA_ROOT: /data
    volumes:
      - ${DATA_ROOT:-/data}:/data:ro
    command: python scripts/sync_stats_db.py
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - sync

volumes:
  pgdata:
